name: Release desktop builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            args: --win --x64
          - name: Linux x64
            os: ubuntu-latest
            args: --linux --x64
          - name: macOS universal
            os: macos-latest
            args: --mac --x64 --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build installers (no publish)
        run: |
          npm run build
          npx electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neuron-${{ matrix.os }}
          retention-days: 3
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Neuron ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: artifacts/**/*
